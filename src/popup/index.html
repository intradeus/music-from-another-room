<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music From Another Room</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="header">
    <div class="title">Music From Another Room</div>
    <div class="subtitle" id="site-name">Audio effects</div>
  </div>

  <div class="card">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Wall effect</div>
        <div class="toggle-sublabel" id="toggle-sub">Off</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="collapsible" id="wall-options">
      <div class="collapsible-inner">
        <div class="divider"></div>
        <div class="section">
          <div class="section-header">
            <span class="section-title">Wall Thickness</span>
            <span class="section-value" id="freq-value">400 Hz</span>
          </div>
          <input type="range" id="cutoff" min="100" max="1200" value="400" step="10" />
          <div class="range-labels">
            <span class="range-label">Thick</span>
            <span class="range-label">Thin</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Grain</div>
        <div class="toggle-sublabel" id="grain-sub">Off</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="grain-toggle" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="media-title" id="media-title"></div>
  <div class="status" id="status">Waiting for media…</div>

  <script src="./scripts.ts" type="module"></script>
</body>
</html>
